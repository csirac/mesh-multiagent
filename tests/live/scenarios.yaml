# Controller v0.2 Live Test Scenarios
#
# Each scenario defines:
#   - id: Unique identifier
#   - category: trivial, simple, moderate, complex, edge
#   - input: The message sent to the agent
#   - fixture_branch: Which fixture repo branch to use (default: main)
#   - expected: Structural grading criteria
#
# Grading:
#   PASS    - All constraints met
#   PARTIAL - Completed but exceeded budgets or has warnings
#   FAIL    - Missing required phases/tools, errors occurred

defaults:
  fixture_repo: "/home/git/test-fixtures.git"
  fixture_branch: "main"
  agent: "agent:assistant:v02"
  timeout_seconds: 120

scenarios:
  # ============================================================================
  # TRIVIAL - Direct response, no/minimal tool usage
  # ============================================================================

  - id: T1
    category: trivial
    input: "Hey, how are you?"
    expected:
      min_phases: []
      max_phases: 3
      no_errors: true
      tools_required: []
      tools_forbidden: []
      response_contains: []
      response_excludes: ["error", "failed", "exception"]
      max_duration_seconds: 30
      max_tokens: 3000
      max_llm_calls: 3

  - id: T2
